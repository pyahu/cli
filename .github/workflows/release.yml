name: Release

# Trunk-based: every push to main is tested, then a release is cut when the
# Conventional Commits since the last tag warrant one (feat -> minor,
# fix -> patch, ! / BREAKING CHANGE -> major). docs/chore/refactor/etc. do not
# release.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          unformatted="$(gofmt -l cmd internal pkg)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: false

      # github-tag-action creates the tag via the GitHub API after checkout, so
      # the local working copy doesn't have it yet. GoReleaser requires the tag
      # to be present locally and pointing at HEAD, so fetch it before releasing.
      - name: Sync new tag into the local checkout
        if: steps.tag.outputs.new_tag != ''
        run: git fetch --tags --force

      - name: Release
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
