# GoReleaser configuration for the Pyahu CLI.
# Docs: https://goreleaser.com
version: 2

project_name: pyahu

before:
  hooks:
    - go mod download

builds:
  - id: pyahu
    main: ./cmd/pyahu
    binary: pyahu
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: pyahu
    # pyahu_Linux_x86_64.tar.gz, pyahu_Darwin_arm64.tar.gz, ...
    name_template: >-
      {{ .ProjectName }}_{{ title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^ci:"
      - "^refactor:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: pyahu
    name: cli
  draft: false
  prerelease: auto
